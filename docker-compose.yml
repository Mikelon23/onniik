# Docker Compose — Onniik Local Infrastructure

services:
  postgres:
    image: postgres:16-alpine
    container_name: onniik-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onniik
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d onniik']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: onniik-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: onniik-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/onniik?schema=public
      REDIS_URL: redis://redis:6379
      # Las siguientes variables deben sobreescribirse en producción mediante secretos
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-ejemplo_hash_secreto_muy_largo_de_32_caracteres}
      # En Docker Compose el frontend corre en :8080; en dev local en :5173
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:5000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL se bake dentro del bundle JS en tiempo de build.
        # En producción real, apunta al dominio del backend (ej. https://api.onniik.com/api/v1).
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
    container_name: onniik-frontend
    restart: always
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/index.html']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
