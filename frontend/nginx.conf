server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Compresión Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Cabeceras de Seguridad HTTP ───────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Cache de assets estáticos (JS, CSS, imágenes, fuentes) ───────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Routing: redirigir todas las rutas a index.html ──────────
    # Necesario para el client-side router de Onniik (pushState API).
    # Sin esto, recargar /dashboard o /login daría un 404 de nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Ocultar versión de nginx ──────────────────────────────────────
    server_tokens off;
}
